<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Monitoramento de Desmatamento</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; background: #f0f4f0; color: #333; }
  .login-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .login-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
  .login-box h1 { color: #2d6a4f; margin-bottom: 8px; font-size: 22px; }
  .login-box p { color: #666; margin-bottom: 24px; font-size: 14px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; margin-bottom: 6px; font-weight: bold; font-size: 14px; }
  .form-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
  .btn { width: 100%; padding: 12px; background: #2d6a4f; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }
  .btn:hover { background: #1b4332; }
  .erro { color: red; font-size: 13px; margin-top: 10px; text-align: center; }
  header { background: #2d6a4f; color: white; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
  header h1 { font-size: 18px; }
  .logout-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
  .container { max-width: 1000px; margin: 24px auto; padding: 0 16px; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
  .stat-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); text-align: center; }
  .stat-card h3 { font-size: 32px; color: #2d6a4f; }
  .stat-card p { color: #666; font-size: 14px; }
  .card { background: white; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); padding: 20px; margin-bottom: 24px; }
  .card h2 { color: #2d6a4f; margin-bottom: 16px; font-size: 16px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: #f5f5f5; padding: 10px; text-align: left; border-bottom: 2px solid #ddd; }
  td { padding: 10px; border-bottom: 1px solid #eee; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-group-inline label { display: block; margin-bottom: 4px; font-size: 13px; font-weight: bold; }
  .form-group-inline input, .form-group-inline select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 13px; }
  .btn-sm { padding: 10px 20px; background: #2d6a4f; color: white; border: none; border-radius: 6px; cursor: pointer; margin-top: 12px; }
  .btn-sm:hover { background: #1b4332; }
  .admin-section { background: #fff8e1; border: 1px solid #ffe082; border-radius: 10px; padding: 20px; margin-bottom: 24px; }
  .admin-section h2 { color: #f57c00; margin-bottom: 16px; font-size: 16px; }
  .hidden { display: none; }
  .badge { padding: 3px 8px; border-radius: 4px; font-size: 12px; }
  .badge-pendente { background: #fff3cd; color: #856404; }
  .badge-confirmado { background: #d1e7dd; color: #0f5132; }
</style>
</head>
<body>

<div id="loginPage" class="login-container">
  <div class="login-box">
    <h1>🌿 Monitoramento</h1>
    <p>Sistema de Desmatamento — Polícia Ambiental</p>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="seu@email.com">
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" id="loginSenha" placeholder="••••••••">
    </div>
    <button class="btn" onclick="fazerLogin()">Entrar</button>
    <div id="loginErro" class="erro"></div>
  </div>
</div>

<div id="mainPage" class="hidden">
  <header>
    <h1>🌿 Monitoramento de Desmatamento</h1>
    <div>
      <span id="nomeUsuario" style="margin-right:12px; font-size:14px;"></span>
      <button class="logout-btn" onclick="fazerLogout()">Sair</button>
    </div>
  </header>

  <div class="container">
    <div class="stats">
      <div class="stat-card">
        <h3 id="totalPontos">0</h3>
        <p>Pontos Detectados</p>
      </div>
      <div class="stat-card">
        <h3 id="totalAcoes">0</h3>
        <p>Ações de Campo</p>
      </div>
      <div class="stat-card">
        <h3 id="totalPendentes">0</h3>
        <p>Pendentes</p>
      </div>
    </div>

    <div id="adminSection" class="admin-section hidden">
      <h2>⚙️ Criar Novo Agente</h2>
      <div class="form-row">
        <div class="form-group-inline">
          <label>Nome</label>
          <input type="text" id="novoNome" placeholder="Nome do agente">
        </div>
        <div class="form-group-inline">
          <label>Email</label>
          <input type="email" id="novoEmail" placeholder="email@exemplo.com">
        </div>
        <div class="form-group-inline">
          <label>Senha</label>
          <input type="password" id="novaSenha" placeholder="Senha">
        </div>
      </div>
      <button class="btn-sm" onclick="criarAgente()">Criar Agente</button>
      <div id="agenteMsg" style="margin-top:8px; font-size:13px;"></div>
    </div>

    <div class="card">
      <h2>📍 Registrar Ponto de Desmatamento</h2>
      <div class="form-row">
        <div class="form-group-inline">
          <label>Latitude</label>
          <input type="number" id="lat" placeholder="-23.5505" step="0.0001">
        </div>
        <div class="form-group-inline">
          <label>Longitude</label>
          <input type="number" id="lon" placeholder="-46.6333" step="0.0001">
        </div>
        <div class="form-group-inline">
          <label>Área (ha)</label>
          <input type="number" id="area" placeholder="2.5" step="0.1">
        </div>
        <div class="form-group-inline">
          <label>Município</label>
          <input type="text" id="municipio" placeholder="São Paulo">
        </div>
        <div class="form-group-inline">
          <label>Fonte</label>
          <select id="fonte">
            <option>MapBiomas</option>
            <option>Brasil MAIS</option>
            <option>SMAS/IGC-SP</option>
            <option>Campo</option>
          </select>
        </div>
        <div class="form-group-inline">
          <label>Data Detecção</label>
          <input type="date" id="dataDeteccao">
        </div>
        <div class="form-group-inline" style="grid-column: span 2;">
          <label>Observações</label>
          <input type="text" id="obsP" placeholder="Observações">
        </div>
      </div>
      <button class="btn-sm" onclick="registrarPonto()">Registrar Ponto</button>
      <div id="pontoMsg" style="margin-top:8px; font-size:13px;"></div>
    </div>

    <div class="card">
      <h2>📋 Pontos de Desmatamento</h2>
      <table>
        <thead><tr><th>ID</th><th>Município</th><th>Área (ha)</th><th>Fonte</th><th>Data</th><th>Status</th></tr></thead>
        <tbody id="tabelaPontos"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
  const API = "https://desmatamento-production.up.railway.app";
  let token = null;
  let isAdmin = false;

  async function fazerLogin() {
    const email = document.getElementById("loginEmail").value;
    const senha = document.getElementById("loginSenha").value;
    const erro = document.getElementById("loginErro");
    erro.textContent = "";
    try {
      const res = await fetch(${API}/login, {
        method: "POST",
        headers: {"Content-Type": "application/x-www-form-urlencoded"},
        body: username=&password=
      });
      const data = await res.json();
      if (!res.ok) { erro.textContent = "Email ou senha incorretos."; return; }
      token = data.access_token;
      isAdmin = data.admin;
      document.getElementById("nomeUsuario").textContent = data.nome;
      document.getElementById("loginPage").classList.add("hidden");
      document.getElementById("mainPage").classList.remove("hidden");
      if (isAdmin) document.getElementById("adminSection").classList.remove("hidden");
      carregarDados();
    } catch(e) {
      erro.textContent = "Erro ao conectar com o servidor.";
    }
  }

  function fazerLogout() {
    token = null;
    document.getElementById("loginPage").classList.remove("hidden");
    document.getElementById("mainPage").classList.add("hidden");
  }

  async function carregarDados() {
    const headers = {"Authorization": Bearer };
    const [pontos, acoes] = await Promise.all([
      fetch(${API}/pontos, {headers}).then(r => r.json()),
      fetch(${API}/acoes, {headers}).then(r => r.json())
    ]);
    document.getElementById("totalPontos").textContent = pontos.length;
    document.getElementById("totalAcoes").textContent = acoes.length;
    document.getElementById("totalPendentes").textContent = pontos.filter(p => p.status === "pendente").length;
    const tbody = document.getElementById("tabelaPontos");
    tbody.innerHTML = pontos.map(p => 
      <tr>
        <td></td>
        <td></td>
        <td></td>
        <td></td>
        <td></td>
        <td><span class="badge badge-"></span></td>
      </tr>
    ).join("");
  }

  async function registrarPonto() {
    const msg = document.getElementById("pontoMsg");
    const body = {
      latitude: parseFloat(document.getElementById("lat").value),
      longitude: parseFloat(document.getElementById("lon").value),
      area_ha: parseFloat(document.getElementById("area").value),
      municipio: document.getElementById("municipio").value,
      fonte: document.getElementById("fonte").value,
      data_deteccao: document.getElementById("dataDeteccao").value,
      observacoes: document.getElementById("obsP").value
    };
    const res = await fetch(${API}/pontos, {
      method: "POST",
      headers: {"Content-Type": "application/json", "Authorization": Bearer },
      body: JSON.stringify(body)
    });
    if (res.ok) { msg.style.color="green"; msg.textContent = "Ponto registrado!"; carregarDados(); }
    else { msg.style.color="red"; msg.textContent = "Erro ao registrar ponto."; }
  }

  async function criarAgente() {
    const msg = document.getElementById("agenteMsg");
    const body = {
      nome: document.getElementById("novoNome").value,
      email: document.getElementById("novoEmail").value,
      senha: document.getElementById("novaSenha").value
    };
    const res = await fetch(${API}/agentes, {
      method: "POST",
      headers: {"Content-Type": "application/json", "Authorization": Bearer },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (res.ok) { msg.style.color="green"; msg.textContent = data.mensagem; }
    else { msg.style.color="red"; msg.textContent = data.detail || "Erro ao criar agente."; }
  }

  document.getElementById("loginSenha").addEventListener("keypress", e => {
    if (e.key === "Enter") fazerLogin();
  });
</script>
</body>
</html>
