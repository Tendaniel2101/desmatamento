<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiscalização de Desmatamento</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f4f0; color: #333; }
        
        header {
            background: #1a4a2e;
            color: white;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        header h1 { font-size: 18px; }
        
        .container { max-width: 900px; margin: 32px auto; padding: 0 16px; }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 32px;
        }
        
        .stat-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .stat-card .numero { font-size: 36px; font-weight: bold; color: #1a4a2e; }
        .stat-card .label { font-size: 12px; color: #888; margin-top: 4px; }

        .card {
            background: white;
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 24px;
        }
        .card h2 { font-size: 16px; color: #1a4a2e; margin-bottom: 16px; }

        table { width: 100%; border-collapse: collapse; }
        th { background: #f5f5f5; padding: 10px 12px; text-align: left; font-size: 12px; color: #666; }
        td { padding: 12px; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
        tr:hover { background: #f9fdf9; }

        .status {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
        }
        .status.pendente { background: #fff3cd; color: #856404; }
        .status.em_campo { background: #cce5ff; color: #004085; }
        .status.concluido { background: #d4edda; color: #155724; }

        .fonte {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 11px;
            background: #e8f5e9;
            color: #2d7a4f;
        }

        button {
            background: #1a4a2e;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }
        button:hover { background: #2d7a4f; }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group label { font-size: 12px; color: #666; }
        .form-group input, .form-group select, .form-group textarea {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
        }
        .form-group textarea { grid-column: span 2; resize: vertical; }
        .btn-salvar {
            margin-top: 16px;
            width: 100%;
            padding: 12px;
            font-size: 14px;
        }
        .mensagem {
            padding: 12px;
            border-radius: 6px;
            margin-top: 12px;
            font-size: 13px;
            display: none;
        }
        .mensagem.sucesso { background: #d4edda; color: #155724; display: block; }
        .mensagem.erro { background: #f8d7da; color: #721c24; display: block; }
    </style>
</head>
<body>

<header>
    <span>🌿</span>
    <h1>Sistema de Fiscalização de Desmatamento</h1>
</header>

<div class="container">

    <!-- Estatísticas -->
    <div class="stats">
        <div class="stat-card">
            <div class="numero" id="total">-</div>
            <div class="label">Total de Pontos</div>
        </div>
        <div class="stat-card">
            <div class="numero" id="pendentes" style="color:#856404">-</div>
            <div class="label">Pendentes</div>
        </div>
        <div class="stat-card">
            <div class="numero" id="concluidos" style="color:#155724">-</div>
            <div class="label">Concluídos</div>
        </div>
    </div>

    <!-- Tabela de pontos -->
    <div class="card">
        <h2>📍 Pontos de Desmatamento</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Município</th>
                    <th>Fonte</th>
                    <th>Área (ha)</th>
                    <th>Detecção</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="tabelaPontos">
                <tr><td colspan="6" style="text-align:center;color:#aaa">Carregando...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- Registrar ação -->
    <div class="card">
        <h2>✏️ Registrar Ação de Campo</h2>
        <div class="form-grid">
            <div class="form-group">
                <label>ID do Ponto</label>
                <input type="number" id="pontoId" placeholder="Ex: 1">
            </div>
            <div class="form-group">
                <label>Data da Visita</label>
                <input type="date" id="dataVisita">
            </div>
            <div class="form-group">
                <label>Resultado</label>
                <select id="resultado">
                    <option value="confirmado">Confirmado</option>
                    <option value="nao_confirmado">Não Confirmado</option>
                    <option value="recuperado">Área Recuperada</option>
                </select>
            </div>
            <div class="form-group">
                <label>ID do Agente</label>
                <input type="number" id="agenteId" placeholder="Ex: 1">
            </div>
            <div class="form-group" style="grid-column: span 2;">
                <label>Observações</label>
                <textarea id="observacoes" rows="3" placeholder="Descreva o que foi encontrado em campo..."></textarea>
            </div>
        </div>
        <button class="btn-salvar" onclick="registrarAcao()">💾 Salvar Ação de Campo</button>
        <div class="mensagem" id="mensagem"></div>
    </div>

</div>

<script>
    const API = "http://127.0.0.1:8000";

    async function carregarPontos() {
        try {
            const res = await fetch(`${API}/pontos`);
            const pontos = await res.json();

            const total = pontos.length;
            const pendentes = pontos.filter(p => p.status === 'pendente').length;
            const concluidos = pontos.filter(p => p.status === 'concluido').length;

            document.getElementById('total').textContent = total;
            document.getElementById('pendentes').textContent = pendentes;
            document.getElementById('concluidos').textContent = concluidos;

            const tbody = document.getElementById('tabelaPontos');
            tbody.innerHTML = pontos.map(p => `
                <tr>
                    <td>${p.id}</td>
                    <td>${p.municipio || '-'}</td>
                    <td><span class="fonte">${p.fonte}</span></td>
                    <td>${p.area_ha || '-'}</td>
                    <td>${p.data_deteccao || '-'}</td>
                    <td><span class="status ${p.status}">${p.status}</span></td>
                </tr>
            `).join('');
        } catch(e) {
            document.getElementById('tabelaPontos').innerHTML = 
                '<tr><td colspan="6" style="text-align:center;color:red">Erro ao conectar com o servidor</td></tr>';
        }
    }

    async function registrarAcao() {
        const dados = {
            ponto_id: parseInt(document.getElementById('pontoId').value),
            agente_id: parseInt(document.getElementById('agenteId').value),
            data_visita: document.getElementById('dataVisita').value,
            resultado: document.getElementById('resultado').value,
            observacoes: document.getElementById('observacoes').value
        };

        try {
            const res = await fetch(`${API}/acoes`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dados)
            });

            if (res.ok) {
                mostrarMensagem('Ação registrada com sucesso!', 'sucesso');
                carregarPontos();
            } else {
                mostrarMensagem('Erro ao salvar. Verifique os campos.', 'erro');
            }
        } catch(e) {
            mostrarMensagem('Erro ao conectar com o servidor.', 'erro');
        }
    }

    function mostrarMensagem(texto, tipo) {
        const el = document.getElementById('mensagem');
        el.textContent = texto;
        el.className = `mensagem ${tipo}`;
        setTimeout(() => el.className = 'mensagem', 4000);
    }

    carregarPontos();
</script>

</body>
</html>
